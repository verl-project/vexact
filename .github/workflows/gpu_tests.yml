name: GPU tests

on:
  push:
    branches:
      - main
    paths:
      - "vexact/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/gpu_tests.yml"
  pull_request:
    branches:
      - main
    paths:
      - "vexact/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/gpu_tests.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  IMAGE: "verl-ci-cn-beijing.cr.volces.com/veomni/open_veomni-gpu:pytorch_25_06_py3_cuda12_9.post2"
  DYNAMIC_RUNNER_ENDPOINT: "https://sd7upeujs1b9g1a958pn0.apigateway-cn-beijing.volceapi.com/runner"
  UV_HTTP_TIMEOUT: "300"
  HF_ENDPOINT: "https://hf-mirror.com"
  HF_HUB_ENABLE_HF_TRANSFER: "0"

jobs:
  setup:
    if: github.repository_owner == 'verl-project'
    runs-on: ubuntu-latest
    outputs:
      runner-label: ${{ steps.create-runner.outputs.runner-label }}
      mlp-task-id: ${{ steps.create-runner.outputs.mlp-task-id }}
    steps:
      - uses: actions/checkout@v4
      - id: create-runner
        uses: volcengine/vemlp-github-runner@v1
        with:
          mode: "create"
          faas-url: "${{ env.DYNAMIC_RUNNER_ENDPOINT }}"
          mlp-image: "${{ env.IMAGE }}"

  gpu_tests:
    if: github.repository_owner == 'verl-project'
    needs: setup
    runs-on: ["${{ needs.setup.outputs.runner-label || 'L20x8' }}"]
    timeout-minutes: 120
    env:
      HTTPS_PROXY: ${{ secrets.PROXY_HTTPS }}
      NO_PROXY: "localhost,127.0.0.1,hf-mirror.com"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check runner
        run: |
          if [ -z "${HTTPS_PROXY:-}" ]; then
            echo "PROXY_HTTPS is not available to this repository."
            exit 1
          fi
          nvidia-smi

      - name: Install dependencies
        run: |
          pip3 install uv==0.9.8
          uv sync --frozen --extra gpu --extra dev

      - name: Run GPU smoke tests
        run: |
          uv run --frozen pytest -s -x tests/batch_invariant_ops/test_matmul.py
          uv run --frozen pytest -s -x tests/batch_invariant_ops/test_fused_moe.py
          uv run --frozen pytest -s -x tests/test_inferencer_sampling.py

  cleanup:
    runs-on: ubuntu-latest
    needs: [setup, gpu_tests]
    if: always() && github.repository_owner == 'verl-project' && needs.setup.outputs.mlp-task-id != ''
    steps:
      - id: destroy-runner
        uses: volcengine/vemlp-github-runner@v1
        with:
          mode: "destroy"
          faas-url: "${{ env.DYNAMIC_RUNNER_ENDPOINT }}"
          mlp-task-id: "${{ needs.setup.outputs.mlp-task-id }}"
