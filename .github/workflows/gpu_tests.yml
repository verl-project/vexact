name: GPU tests

on:
  push:
    branches:
      - main
    paths:
      - "vexact/**"
      - "tests/**"
      - ".github/scripts/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/gpu_tests.yml"
  pull_request:
    branches:
      - main
    paths:
      - "vexact/**"
      - "tests/**"
      - ".github/scripts/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/gpu_tests.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  IMAGE: "verl-ci-cn-beijing.cr.volces.com/verlai/verl:vllm020.dev1"
  DYNAMIC_RUNNER_ENDPOINT: "https://sd8klead1m3i8pinulbk0.apigateway-cn-beijing.volceapi.com/runner"
  UV_HTTP_TIMEOUT: "300"
  HF_HUB_ENABLE_HF_TRANSFER: "0"

jobs:
  setup:
    if: github.repository_owner == 'verl-project'
    runs-on: ubuntu-latest
    outputs:
      runner-label: ${{ steps.create-runner.outputs.runner-label }}
      mlp-task-id: ${{ steps.create-runner.outputs.mlp-task-id }}
    steps:
      - uses: actions/checkout@v4
      - id: create-runner
        uses: volcengine/vemlp-github-runner@v1
        with:
          mode: "create"
          faas-url: "${{ env.DYNAMIC_RUNNER_ENDPOINT }}"
          mlp-image: "${{ env.IMAGE }}"

  gpu_tests:
    if: github.repository_owner == 'verl-project'
    needs: setup
    runs-on: ["${{ needs.setup.outputs.runner-label || 'L20x8' }}"]
    timeout-minutes: 360
    env:
      NO_PROXY: "localhost,127.0.0.1,hf-mirror.com"
      VEXACT_TESTS_ATTN_IMPL: "triton-invariant"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check runner
        run: nvidia-smi

      - name: Install dependencies
        run: |
          pip3 install uv==0.9.8
          uv sync --frozen --extra gpu --extra dev --extra veomni --extra vllm --extra verl

      - name: Run GPU unit and smoke tests
        run: .github/scripts/run_gpu_tests.sh

  cleanup:
    runs-on: ubuntu-latest
    needs: [setup, gpu_tests]
    if: always() && github.repository_owner == 'verl-project' && needs.setup.outputs.mlp-task-id != ''
    steps:
      - id: destroy-runner
        uses: volcengine/vemlp-github-runner@v1
        with:
          mode: "destroy"
          faas-url: "${{ env.DYNAMIC_RUNNER_ENDPOINT }}"
          mlp-task-id: "${{ needs.setup.outputs.mlp-task-id }}"
