name: Nightly batch invariant ops tests

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  batch-invariant-ops-tests:
    runs-on: [self-hosted, gpu]
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show GPU
        run: nvidia-smi

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run batch invariant ops tests
        run: pytest -s tests/batch_invariant_ops/
