name: Nightly batch_invariant_ops tests on Merlin GPU
trigger:
  # NOTE: cron schedule is set in the Codebase UI, not this file.
  cron:
    notification:
      when: [success, failure]
  manual:
jobs:
  batch_invariant_ops_nightly:
    name: batch-invariant-ops-nightly
    image: aliyun-sin-hub.byted.org/codebase/ci_python_39
    runs-on:
      env: i18n
    steps:
      - name: launch job
        uses: merlin/training-action
        inputs:
          job_def_name: "vexact_nightly"
          region: "i18n"
          wait_result_timeout: 1800
          use_merlin_resource_account: true
          entrypoint: |
            . ci/nightly.sh
